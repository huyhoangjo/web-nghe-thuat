<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Bảng Quản Trị | Living Artistic Archive</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: #F2F2F7; padding: 0; min-height: 100vh;">

  <!-- Login Gate Panel -->
  <div id="login-panel" style="display: block;">
    <div style="max-width: 400px; margin: 10% auto; background-color: #fff; border: 1px solid var(--border-color); padding: 3rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;">
      <h2 class="font-serif" style="font-size: 2rem; margin-bottom: 1rem;">LOG IN TO CMS</h2>
      <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem;">Please enter the passcode to access the archive logs (Default: <strong>1234</strong>)</p>
      <form id="login-form" style="display: flex; flex-direction: column; gap: 1.25rem; text-align: left;">
        <div class="form-group">
          <label for="passcode" style="font-size: 0.75rem; letter-spacing: 0.15em; font-weight: 600;">PASSCODE</label>
          <input type="password" id="passcode" class="form-input" required placeholder="••••" style="text-align: center; font-size: 1.25rem;">
        </div>
        <button type="submit" class="submit-btn" style="width: 100%; margin-top: 1rem; border-color: var(--text-charcoal);">Access Logs</button>
      </form>
    </div>
  </div>

  <!-- CRUD Panel Dashboard (Hidden by default) -->
  <div id="dashboard-panel" class="admin-shell" style="display: none;">
    
    <!-- Left Sidebar Menu -->
    <aside class="admin-sidebar">
      <div class="admin-logo">LOGS ARCHIVE</div>
      <nav>
        <ul class="admin-menu" id="admin-menu-tabs">
          <li><button class="active" data-tab="works"><i class="fa-solid fa-paintbrush" style="margin-right: 0.5rem;"></i> Works (Tác phẩm)</button></li>
          <li><button data-tab="journal"><i class="fa-solid fa-quote-left" style="margin-right: 0.5rem;"></i> Journal (Ký ức)</button></li>
          <li><button data-tab="fieldNotes"><i class="fa-solid fa-compass" style="margin-right: 0.5rem;"></i> Field Notes (Điền dã)</button></li>
          <li><button data-tab="publications"><i class="fa-solid fa-book-open" style="margin-right: 0.5rem;"></i> Publications (Ấn phẩm)</button></li>
          <li><button data-tab="archive"><i class="fa-solid fa-box-archive" style="margin-right: 0.5rem;"></i> Archive (Lưu trữ)</button></li>
          <li><button data-tab="cv"><i class="fa-solid fa-list-ul" style="margin-right: 0.5rem;"></i> CV Timeline</button></li>
        </ul>
      </nav>
      <div style="margin-top: auto; padding: 1rem 0; border-top: 1px solid #3A3A3C;">
        <a href="index.html" style="color: #AEAEB2; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;"><i class="fa-solid fa-arrow-left"></i> Return to Site</a>
        <button id="logout-btn" style="color: #FF453A; font-size: 0.85rem; display: block; margin-top: 1rem; text-align: left;"><i class="fa-solid fa-power-off" style="margin-right: 0.25rem;"></i> Exit CMS</button>
      </div>
    </aside>

    <!-- Right Content Panel -->
    <main class="admin-content">
      
      <div class="admin-header-row">
        <div>
          <h1 class="font-serif" id="admin-category-title" style="font-size: 2.2rem; text-transform: uppercase;">Works Management</h1>
          <p id="admin-category-desc" style="font-size: 0.85rem; color: var(--text-muted);">Configure works details and evolutionary chapters.</p>
        </div>
        <div style="display: flex; gap: 1rem;">
          <button id="reset-db-btn" class="admin-btn admin-btn-secondary" style="font-size: 0.75rem;"><i class="fa-solid fa-rotate-left"></i> Restore Seed Data</button>
          <button id="add-new-btn" class="admin-btn"><i class="fa-solid fa-plus"></i> Add Entry</button>
        </div>
      </div>

      <!-- Listing View Table -->
      <div style="background-color: #fff; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.02); overflow-x: auto;">
        <table class="admin-table">
          <thead id="admin-table-head">
            <!-- Injected by admin.js -->
          </thead>
          <tbody id="admin-table-body">
            <!-- Injected by admin.js -->
          </tbody>
        </table>
      </div>

      <!-- Editor Panel Modal-like (Hidden by default, displayed inline below or when adding/editing) -->
      <div class="admin-form-panel" id="admin-form-panel" style="display: none;">
        <h3 class="font-serif" id="form-title" style="font-size: 1.8rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem;">Add New Entry</h3>
        
        <form id="crud-form">
          <input type="hidden" id="edit-id">
          
          <div class="admin-form-grid" id="form-fields-container">
            <!-- Rendered dynamically by admin.js based on active section -->
          </div>

          <div class="admin-form-actions">
            <button type="button" id="cancel-edit-btn" class="admin-btn admin-btn-secondary">Cancel</button>
            <button type="submit" class="admin-btn">Save Entry</button>
          </div>
        </form>
      </div>

    </main>

  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
