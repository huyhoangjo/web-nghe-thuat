<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGO THI THUY DUYEN | Living Artistic Archive</title>
  <meta name="description" content="The Living Artistic Archive of Vietnamese contemporary artist Ngo Thi Thuy Duyen. A digital space where artworks, memories, travels, and observations coexist.">
  <link rel="stylesheet" href="style.css?v=2.2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Mobile Header (Visible only on screens < 1024px) -->
  <div class="mobile-header">
    <a href="#home" class="mobile-logo">NGO THI THUY DUYEN</a>
    <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Menu Toggle">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>

  <div class="app-layout">
    <!-- Minimal Left Sidebar -->
    <aside class="sidebar" id="app-sidebar">
      <div class="sidebar-top">
        <a href="#home" class="logo-link" id="nav-logo">NGO THI THUY DUYEN</a>
        <p class="sidebar-subtitle">Living Artistic Archive</p>
      </div>
      
      <nav class="sidebar-nav">
        <ul class="nav-menu" id="nav-menu">
          <!-- Rendered dynamically to support active underline and bilingual naming -->
        </ul>
      </nav>

      <div class="sidebar-bottom">
        <div class="nav-actions">
          <button id="search-toggle-btn" class="nav-btn" aria-label="Search archive">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
          <button id="lang-toggle" class="nav-btn lang-toggle">VI</button>
          <a href="admin.html" class="nav-btn-link" id="nav-admin-link">CMS</a>
        </div>
        <p class="sidebar-copyright">© 2026 Ngo Thi Thuy Duyen</p>
      </div>
    </aside>

    <!-- Main View Canvas Area -->
    <main id="main-content">
    
    <!-- HOME VIEW -->
    <div id="view-home" class="view-container">
      <!-- Fullscreen Hero Image -->
      <div class="hero">
        <img id="home-hero-image" class="hero-img" alt="Cover artwork">
        <div class="hero-overlay">
          <h2 class="hero-title" id="home-hero-title"></h2>
        </div>
      </div>
      
      <!-- Philosophy Statement -->
      <div class="opening-statement">
        <blockquote id="home-statement-quote"></blockquote>
        <p id="home-statement-sub"></p>
      </div>

      <!-- Featured Artwork Section -->
      <div class="featured-artwork">
        <p class="section-label" id="home-featured-label"></p>
        <div class="featured-grid" id="home-featured-content">
          <!-- Featured artwork rendered via app.js -->
        </div>
      </div>
    </div>

    <!-- ABOUT VIEW -->
    <div id="view-about" class="view-container">
      <div class="about-grid">
        <div class="artwork-display">
          <img src="assets/portrait.jpg" alt="Portrait Ngo Thi Thuy Duyen" style="max-height: 550px; object-fit: cover;">
        </div>
        <div>
          <p class="section-label" id="about-practice-label"></p>
          <h2 class="font-serif" style="font-size: 2.8rem; margin-bottom: 2rem;" id="about-title"></h2>
          <div class="about-bio" id="about-bio-content"></div>
          
          <div class="about-practice">
            <h4 id="about-mediums-label" style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 1rem;"></h4>
            <ul class="practice-list" id="about-practice-list"></ul>
          </div>
        </div>
      </div>
    </div>

    <!-- WORKS VIEW -->
    <div id="view-works" class="view-container">
      <p class="section-label" id="works-section-label"></p>
      <h2 class="font-serif" style="font-size: 2.5rem; margin-bottom: 1.5rem;" id="works-title"></h2>
      
      <!-- Chapters Sub-menu -->
      <ul class="chapters-nav" id="works-chapters-nav"></ul>

      <!-- Masonry Grid -->
      <div class="works-masonry" id="works-grid"></div>
    </div>

    <!-- JOURNAL VIEW -->
    <div id="view-journal" class="view-container">
      <p class="section-label" id="journal-section-label"></p>
      <h2 class="font-serif" style="font-size: 2.5rem; margin-bottom: 3rem;" id="journal-title"></h2>
      
      <div class="journal-list" id="journal-list"></div>
    </div>

    <!-- FIELD NOTES VIEW -->
    <div id="view-fieldNotes" class="view-container">
      <p class="section-label" id="fn-section-label"></p>
      <h2 class="font-serif" style="font-size: 2.5rem; margin-bottom: 1.5rem;" id="fn-title"></h2>
      
      <!-- Category Filter -->
      <ul class="field-notes-categories" id="fn-categories-nav"></ul>

      <div class="field-notes-grid" id="fn-grid"></div>
    </div>

    <!-- PUBLICATIONS VIEW -->
    <div id="view-publications" class="view-container">
      <p class="section-label" id="pub-section-label"></p>
      <h2 class="font-serif" style="font-size: 2.5rem; margin-bottom: 3rem;" id="pub-title"></h2>
      
      <div class="publications-grid" id="pub-grid"></div>
    </div>

    <!-- ARCHIVE VIEW -->
    <div id="view-archive" class="view-container">
      <p class="section-label" id="arc-section-label"></p>
      <h2 class="font-serif" style="font-size: 2.5rem; margin-bottom: 1.5rem;" id="arc-title"></h2>
      
      <!-- Archive Filter -->
      <ul class="field-notes-categories" id="arc-categories-nav"></ul>

      <div class="archive-grid" id="arc-grid"></div>
    </div>

    <!-- CV VIEW -->
    <div id="view-cv" class="view-container">
      <div class="cv-container">
        <p class="section-label" id="cv-section-label"></p>
        <h2 class="font-serif" style="font-size: 2.5rem; margin-bottom: 1.5rem;" id="cv-title"></h2>
        
        <!-- CV Filter Category -->
        <ul class="cv-categories-nav" id="cv-categories-nav"></ul>

        <div class="cv-timeline" id="cv-timeline"></div>
      </div>
    </div>

    <!-- CONTACT VIEW -->
    <div id="view-contact" class="view-container">
      <div class="contact-container">
        <p class="section-label" id="contact-section-label" style="text-align: center;"></p>
        <h2 class="font-serif" style="font-size: 2.5rem; text-align: center; margin-bottom: 1.5rem;" id="contact-title"></h2>
        
        <p class="contact-text" id="contact-text-p"></p>
        
        <div class="contact-links" id="contact-links-list"></div>

        <form class="contact-form" id="contact-form">
          <div class="form-group">
            <label for="contact-name" id="label-name"></label>
            <input type="text" id="contact-name" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="contact-email" id="label-email"></label>
            <input type="email" id="contact-email" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="contact-msg" id="label-msg"></label>
            <textarea id="contact-msg" class="form-input form-textarea" required></textarea>
          </div>
          <button type="submit" class="submit-btn" id="contact-submit-btn"></button>
        </form>
      </div>
    </div>

  </main>

  <!-- Minimal Footer -->
  <footer style="margin-top: 6rem; border-top: 1px solid var(--border-color); padding: 3rem 0; text-align: center; font-size: 0.8rem; color: var(--text-muted);">
    <div class="container">
      <p id="footer-copyright"></p>
      <p style="margin-top: 0.5rem;" id="footer-concept"></p>
    </div>
  </footer>

  </div> <!-- End of .app-layout -->

  <!-- Dialog Modal Lightbox -->
  <dialog id="details-dialog">
    <div class="dialog-layout" id="dialog-content">
      <!-- Injected via app.js -->
    </div>
  </dialog>

  <!-- Fullscreen Search Overlay -->
  <div id="search-overlay" class="search-overlay">
    <div class="container" style="padding-top: 3rem;">
      <div class="search-header">
        <div class="search-input-wrapper">
          <input type="text" id="search-input" class="search-overlay-input" placeholder="Search archive / Tìm kiếm lưu trữ...">
          <button id="search-close-btn" class="search-close-btn" aria-label="Close search"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>
      <div class="search-results">
        <div class="search-results-grid" id="search-results-container"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
